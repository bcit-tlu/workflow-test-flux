# Apply environment-specific replacements
# - https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/replacements/
---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

replacements:
  - source:
      kind: ConfigMap
      name: release-name
      fieldPath: data.RELEASE_NAME
    targets:
      # Append the release name to the OCIRepository URL
      - select:
          kind: OCIRepository
        fieldPaths:
          - spec.url
        options:
          delimiter: "/"
          index: 5
      # Ensure the serviceaccount name matches the release name
      - select:
          kind: VaultAuth
        fieldPaths:
          - spec.kubernetes.serviceAccount

      # Prefix the secret's path with the release name
      # - this field also gets updated by the environment replacement kustomization
      - select:
          kind: VaultStaticSecret
          annotationSelector: config.fluxcd.io/app-secret=true
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 0
      - select:
          kind: VaultDynamicSecret
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 0
