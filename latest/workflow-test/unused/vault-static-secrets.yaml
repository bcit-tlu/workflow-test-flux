# VaultStaticSecrets for HRIV — managed by flux-fleet, not the Helm chart.
#
# The chart's files/_vso-static-secrets.yaml is reference documentation only
# (not in templates/, so Helm does not render it).  When vault.enabled=true
# the chart skips its own placeholder Secrets and expects these K8s Secrets
# to already exist.
#
# Vault paths use ${CLUSTER_ENV} resolved via postBuild.substituteFrom
# (cluster-vars ConfigMap), so each environment reads from its own KV prefix.
#
# K8s Secret names MUST match what the Helm chart templates reference:
#   workflow-test-db-bootstrap         (cnpg-cluster.yaml — initdb.secret)
#   workflow-test-db-superuser-bootstrap (cnpg-cluster.yaml — superuserSecret)
#   workflow-test-db-app               (deployment.yaml — DATABASE_URL)
#   workflow-test-report-issue-pat     (deployment.yaml — GITHUB_TOKEN)
#   workflow-test-oidc                 (deployment.yaml — OIDC_CLIENT_*)
#   workflow-test-azure                 (backup deployment — AZURE_STORAGE_CONNECTION_STRING)

# ── CNPG bootstrap credentials (app owner) ────────────────────────────────────
# Vault path: apps/data/hriv/<env>/db-app
# Expected keys: username, password
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: workflow-test-db-bootstrap
  namespace: hriv
spec:
  type: kv-v2
  mount: apps
  path: hriv/${CLUSTER_ENV}/db-app
  vaultAuthRef: vault-auth
  refreshAfter: 1h
  destination:
    name: workflow-test-db-bootstrap
    create: true
    type: kubernetes.io/basic-auth


# ── CNPG superuser credentials ────────────────────────────────────────────────
# Vault path: apps/data/hriv/<env>/db-superuser
# Expected keys: username, password
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: workflow-test-db-superuser-bootstrap
  namespace: hriv
spec:
  type: kv-v2
  mount: apps
  path: hriv/${CLUSTER_ENV}/db-superuser
  vaultAuthRef: vault-auth
  refreshAfter: 1h
  destination:
    name: workflow-test-db-superuser-bootstrap
    create: true
    type: kubernetes.io/basic-auth


# ── Database connection URI ───────────────────────────────────────────────────
# Vault path: apps/data/hriv/<env>/db-app  (same as bootstrap)
# Reads username + password and builds a postgresql:// URI via transformation.
# CNPG does NOT auto-generate the <cluster>-app Secret when
# bootstrap.initdb.secret.name is provided.
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: workflow-test-db-app
  namespace: hriv
spec:
  type: kv-v2
  mount: apps
  path: hriv/${CLUSTER_ENV}/db-app
  vaultAuthRef: vault-auth
  refreshAfter: 1h
  destination:
    name: workflow-test-db-app
    create: true
    type: Opaque
    transformation:
      excludeRaw: true
      excludes:
        - ".*"
      templates:
        uri:
          text: >-
            postgresql://{{ get .Secrets "username" | urlquery }}:{{ get .Secrets "password" | urlquery }}@workflow-test-db-rw:5432/hriv


