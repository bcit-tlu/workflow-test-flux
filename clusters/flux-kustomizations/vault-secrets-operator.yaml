# Flux Kustomizations for Vault Secrets Operator.
#
# Two-stage deployment:
#   1. Controller — installs the VSO Helm chart (HelmRelease + HelmRepository).
#   2. Config     — applies the cluster-wide VaultAuthGlobal and token-review
#                   ServiceAccount, depends on the controller being ready.
#
# The config stage uses postBuild.substituteFrom to resolve per-environment
# variables (e.g. CLUSTER_ENV) from the cluster-vars ConfigMap in flux-system.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vault-secrets-operator
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/vault-secrets-operator/controller
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vault-secrets-operator-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/vault-secrets-operator/config
  prune: true
  wait: true
  dependsOn:
    - name: vault-secrets-operator
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
