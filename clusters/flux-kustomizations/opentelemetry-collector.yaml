# Flux Kustomization for OpenTelemetry Collector.
#
# Wraps the existing controller manifests in a Flux Kustomization for
# consistent dependency ordering with other infrastructure components.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: opentelemetry-collector
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/opentelemetry-collector/controller
  prune: true
  wait: true
