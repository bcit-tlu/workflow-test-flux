# VaultStaticSecrets managed by flux-fleet
#
# Vault paths use ${CLUSTER_ENV} resolved via postBuild.substituteFrom
#
# K8s Secret names MUST match what the Helm chart templates reference:
#
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ${RELEASE_NAME}-azure
spec:
  type: kv-v2
  mount: apps
  path: ${RELEASE_NAME}/${CLUSTER_ENV}/azure-storage
  vaultAuthRef: ${RELEASE_NAME}
  refreshAfter: 1h
  destination:
    name: ${RELEASE_NAME}-azure
    create: true
    type: Opaque
