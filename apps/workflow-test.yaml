# Flux Kustomization Custom Resource Definition
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workflow-test
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/overlays/cluster-env/workflow-test
  prune: true
  wait: true
  dependsOn:
    - name: flux-system
    # - name: vault-secrets-operator-config
  #   - name: cloudnative-pg-config
  postBuild:
    substitute:
      RELEASE_NAME: workflow-test
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
