# Flux Kustomization Custom Resource Definition
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-kustomization
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./cluster-env
  prune: true
  wait: true
  # dependsOn:
  #   - name: vault-secrets-operator-config
  #   - name: cloudnative-pg-config
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-env
      - kind: ConfigMap
        name: release-name
